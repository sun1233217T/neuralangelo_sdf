# DTU ours: SDF training with sparse COLMAP point-cloud SDF warmup.
_parent_: projects/sdf_angelo/configs/dtu_base.yaml

trainer:
    loss_weight:
        pc_sdf: 2.0
    pointcloud_sdf:
        enabled: True
        path: sparse/0/points3D.bin
        num_samples: 20000
        warmup_iters: 2000
        end_iter: 50000
        loss_type: huber
        huber_delta: 0.1
        max_error: 2.0
